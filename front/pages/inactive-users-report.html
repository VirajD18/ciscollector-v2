<section id="page-inactive-users-report" class="page">
          <h1>Inactive Users Report</h1>
          <p class="subtitle">Fleet-wide inactive DB users · Log Parser Menu 6 · <span id="inactive-users-hint">—</span></p>

          <div class="stats user-report-stats">
            <div class="stat-card user-report-stat-card user-report-stat-card--users">
              <div class="stat-label">Inactive Users</div>
              <div class="stat-value" id="inactive-users-stat-users">—</div>
            </div>
            <div class="stat-card user-report-stat-card user-report-stat-card--hosts">
              <div class="stat-label">Affected Hosts</div>
              <div class="stat-value" id="inactive-users-stat-hosts">—</div>
            </div>
            <div class="stat-card user-report-stat-card user-report-stat-card--source">
              <div class="stat-label">Data Source</div>
              <div class="stat-value user-report-stat-source">Log Parser</div>
            </div>
          </div>

          <div class="report-block user-report-panel">
            <div class="report-block-header user-report-panel-header">
              <div>
                <h2>Inactive Accounts</h2>
                <p>Roles not seen in pg_log · requires <code>log_connections</code> and log parser scan</p>
              </div>
              <label class="user-report-search">
                <span class="user-report-search-label">Search</span>
                <input type="search" id="inactive-users-search" placeholder="User or host…" autocomplete="off" />
              </label>
            </div>
            <div class="report-block-body user-report-body">
              <div class="user-report-table-wrap">
                <table class="user-report-table">
                  <thead>
                    <tr>
                      <th class="user-report-col-user">User</th>
                      <th class="user-report-col-host">Host</th>
                      <th class="user-report-col-databases">Databases</th>
                      <th class="user-report-col-status">Status</th>
                      <th class="user-report-col-action"></th>
                    </tr>
                  </thead>
                  <tbody id="inactive-users-tbody">
                    <tr><td colspan="5" class="user-report-empty">Loading inactive users…</td></tr>
                  </tbody>
                </table>
              </div>
              <div class="table-pagination user-report-pagination" id="inactive-users-pagination" hidden></div>
            </div>
          </div>
        </section>
