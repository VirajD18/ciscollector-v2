<header class="topbar">
<div class="breadcrumb" id="breadcrumb"><strong>Fleet Overview</strong> / Executive Fleet Dashboard</div>
        <div class="topbar-actions">
          <input type="search" placeholder="Search hostname, IP…" style="padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);width:200px;" />
          <select id="global-range-select" class="btn" style="padding:8px 12px;cursor:pointer;">
            <option value="24h">Last 24 hours</option>
            <option value="7d">Last 7 days</option>
            <option value="30d" selected>Last 30 days</option>
          </select>
          <button type="button" class="btn btn-primary" id="global-refresh-btn">Refresh</button>
        </div>
</header>
